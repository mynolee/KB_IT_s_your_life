<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .avlle{
            width: 3000px; height: 3000px;
            background-color: black;
        }
        .circle{
            width: 100px; height: 100px;
            border-radius: 50% 50%;
        }
        .circle1{
            width: 50px; height: 50px;
            border-radius: 50% 50%;
        }
        .circle2{
            width: 25px; height: 25px;
            border-radius: 50% 50%;
        }
        #red{
            position: absolute;
            left: 200px; top: 200px;
            background-color: red;
        }
        #yellow{
            position: absolute;
            left: 250px; top: 250px;
            background-color: yellow;
        }
        #orange{
            position: absolute;
            left: 270px; top: 300px;

            background-color: orange;
        }
        #green{
            position: absolute;
            left: 300px; top: 320px;
            background-color: green;
        }
        #skyblue{
            position: absolute;
            left: 340px; top: 355px;
            background-color: skyblue;
        }#blue{
            position: absolute;
            left: 380px; top: 390px;
            background-color: blue;
        }#darkblue{
            position: absolute;
            left: 400px; top: 430px;
            background-color: darkblue;
        }#purple{
            position: absolute;
            left: 420px; top: 450px;
            background-color: purple;
        }
        #white{
            position: absolute;
            left: 200px; top: 200px;
            background-color: white;
        }
        #black{
            position: absolute;
            left: 220px; top: 220px;
            background-color: black;
        }
    </style>
</head>
<body>
    <div id="avlle" class="avlle">
        <div id="red" class="circle"></div>
        <div id= "yellow" class="circle"></div>
        <div id= "orange" class="circle"></div>
        <div id= "green" class="circle"></div>
        <div id= "skyblue" class="circle"></div>
        <div id= "blue" class="circle"></div>
        <div id= "darkblue" class="circle"></div>
        <div id= "purple" class="circle"></div>
        <div id= "white" class="circle1"></div>
        <div id= "black" class="circle2"></div>
    </div>
</body>
</html>
