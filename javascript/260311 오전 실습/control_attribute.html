<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Basic</title>
    <script>
        window.onload = function(){
            let image = document.getElementById('image');

            image.src = 'http://via.placeholder.com/300*200';
            image.width = 300;
            image.height = 200;
        };

</head>

    <img id = "image">
    
</body>
